<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        <h2>Guessing a Number Game</h2>
    </title>

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
            background: #30dba8;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            color: white;
        }

        .form {
            padding: 40px;
        }

        #guessfield {
            height: 20px;
            padding: 15px;
            border-color: black;
            margin-left: 70px;
            width: 50%;

        }

        #submit {
            font-size: 18px;
            margin: 10px 0;
            padding: 10px 40px;
            color: white;
            background: #1494a0;

        }

        #guess {
            font-size: 44px;
            text-align: center;

        }

        #p {
            font-size: 30px;
        }

        .resultpara {
            font-size: 35px;
        }
    </style>
</head>

<body>
    <div id="container">
        <p>
        <h1>Number Guessing Game</h1>
        </p>
        <p id="p">Try and guess numbers between 1 and 100</p>
        <p id="p">You have 10 attempts to guess the number</p>

        <form class="form">
            <label for="guessField" id="guess">
                <h1>Guess a number</h1>
            </label>
            <br>
            <input type="text" id="guessfield">
        </form>
        <input type="submit" id="submit" value="Submit guess">


        <div class="resultpara">
            <p>Previous guess:<span class="guesses"></span></p>
            <p>Guesses Remaining:<span class="lastresult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>
</body>
<script>
    let randomNumber = console.log(parseInt(Math.random() * 100 + 1))
    const submit = document.querySelector('#submit')
    const userInput = document.querySelector('#guessfield')
    const guessSlots = document.querySelector('.guesses')
    const remaining = document.querySelector('.lastresult')
    const lowOrHi = document.querySelector('.lowOrHi')
    const startOver = document.querySelector('.resultpara')

    const p = document.createElement('p')

    let prevGuess = [];
    let numGuess = 1

    let playGame = true

    if (playGame) {
        submit.addEventListener('click', function (e) {
            e.preventDefault()
            const guess = parseInt(userInput.value);
            console.log(guess)
            validateGuess(guess)
        });
    }

    function validateGuess(guess) {
        //vlaidate the type of value and within the range
        if (isNaN(guess)) {
            alert("please enter valid value")
        }
        else if (guess < 1) {
            alert("please enter valid value greater than 1")
        }
        else if (guess > 100) {
            alert("please enter vslue less than 100")
        }
        else {
            prevGuess.push(guess);
            if (numGuess === 11) {
                displayGuess(guess)
                displayMessage(`Game Over.Random number was ${randomNumber}`)
                endGame()
            }
            else {
                displayGuess(guess)
                checkGuess(guess)
            }
        }
    }


    function checkGuess(guess) {
        if (guess === randomNumber) {
            displayMessage('you have guessed it right')
            endGame()
        }
        else if (guess < randomNumber) {
            displayMessage('the number is too low')
        }
        else if (guess > randomNumber) {
            displayMessage('the number is too high')
        }
    }

    function displayGuess(guess) {
        //clean the value and update guess value array
        userInput.value = ' '
        guessSlots.innerHTML += `${guess}  `
        numGuess++;
        remaining.innerHTML = `${11 - numGuess}`

    }

    function displayMessage(message) {
        lowOrHi.innerHTML = `<h2>${message}</h2>`

    }

    function endGame() {
        userInput.value = ''
        userInput.setAttribute('disabled', '')
        p.classList.add('button')
        p.innerHTML = `<h2 id="newGame">Start new game</h2>`
        startOver.appendChild(p)
        playGame = false
         newGame()
    }

    function newGame() {
        const newbutton = document.querySelector('#newGame')
        newbutton.addEventListener('click', function (e) {
            randomNumber = console.log(parseInt(Math.random() * 100 + 1))
            prevGuess = []
            numGuess = 1
            guessSlots.innerHTML = ''
            remaining.innerHTML = `${11 - numGuess}`
            userInput.removeAttribute('disabled')
            startOver.removeChild(p)


            playGame = true

        });
    }
</script>

</html>
